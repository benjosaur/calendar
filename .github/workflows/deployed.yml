name: Record deployment

# After a change lands on main (and Vercel + Convex redeploy), tell the app what
# SHA is now live. Open browser tabs compare this to the SHA they were built with
# and prompt a reload when they're running stale frontend code.
on:
  push:
    branches: [main]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Convex of live SHA
        env:
          CONVEX_SITE_URL: ${{ vars.CONVEX_SITE_URL }}
          CALLBACK_SECRET: ${{ secrets.CODEGEN_CALLBACK_SECRET }}
          SHA: ${{ github.sha }}
        run: |
          curl -sS -X POST "$CONVEX_SITE_URL/codegen/deployed" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg sha "$SHA" --argjson at "$(date +%s%3N)" \
              '{sha:$sha, deployedAt:$at}')"
